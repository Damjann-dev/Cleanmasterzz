<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Status update</title>
</head>
<body style="margin:0;padding:0;background-color:#f4f6f8;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;">
<table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#f4f6f8;">
<tr><td align="center" style="padding:30px 15px;">

<!-- Container -->
<table role="presentation" width="600" cellpadding="0" cellspacing="0" style="background-color:#ffffff;border-radius:12px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,0.08);">

<!-- Header -->
<tr>
<td style="background:{primary_color};padding:28px 40px;text-align:center;">
    {logo_html}
    <h1 style="margin:0;color:#ffffff;font-size:20px;font-weight:600;">Update over uw boeking</h1>
</td>
</tr>

<!-- Body -->
<tr>
<td style="padding:32px 40px;">
    <p style="margin:0 0 20px;color:#2d3436;font-size:15px;line-height:1.6;">Beste {naam},</p>
    <p style="margin:0 0 24px;color:#2d3436;font-size:15px;line-height:1.6;">De status van uw boeking is bijgewerkt:</p>

    <!-- Status Change -->
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="margin-bottom:28px;">
    <tr>
        <td align="center">
            <table role="presentation" cellpadding="0" cellspacing="0">
            <tr>
                <td style="background:#f1f3f5;padding:10px 20px;border-radius:8px;text-align:center;">
                    <span style="color:#6c757d;font-size:12px;display:block;margin-bottom:2px;">Vorige status</span>
                    <span style="color:#495057;font-size:15px;font-weight:600;">{oude_status}</span>
                </td>
                <td style="padding:0 16px;color:#adb5bd;font-size:20px;">&rarr;</td>
                <td style="background:{status_kleur};padding:10px 20px;border-radius:8px;text-align:center;">
                    <span style="color:rgba(255,255,255,0.8);font-size:12px;display:block;margin-bottom:2px;">Nieuwe status</span>
                    <span style="color:#ffffff;font-size:15px;font-weight:600;">{nieuwe_status}</span>
                </td>
            </tr>
            </table>
        </td>
    </tr>
    </table>

    <!-- Booking Summary -->
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background:#f8f9fa;border-radius:8px;margin-bottom:24px;">
    <tr><td style="padding:20px 24px;">
        <h4 style="margin:0 0 12px;color:#2d3436;font-size:14px;font-weight:600;">Boekingsoverzicht</h4>
        <table role="presentation" width="100%" cellpadding="0" cellspacing="0">
            <tr>
                <td style="padding:4px 0;color:#6c757d;font-size:13px;width:130px;">Diensten</td>
                <td style="padding:4px 0;color:#2d3436;font-size:14px;">{diensten_samenvatting}</td>
            </tr>
            <tr>
                <td style="padding:4px 0;color:#6c757d;font-size:13px;">Voorkeursdatum</td>
                <td style="padding:4px 0;color:#2d3436;font-size:14px;">{datum}</td>
            </tr>
            <tr>
                <td style="padding:4px 0;color:#6c757d;font-size:13px;">Totaal</td>
                <td style="padding:4px 0;color:{primary_color};font-size:14px;font-weight:600;">{totaal}</td>
            </tr>
        </table>
    </td></tr>
    </table>

    <p style="margin:0;color:#6c757d;font-size:14px;line-height:1.6;">{status_bericht}</p>
</td>
</tr>

<!-- Footer -->
<tr>
<td style="background:#f8f9fa;padding:20px 40px;border-top:1px solid #e9ecef;text-align:center;">
    <p style="margin:0;color:#6c757d;font-size:12px;line-height:1.5;">{footer_tekst}</p>
    <p style="margin:8px 0 0;color:#adb5bd;font-size:11px;">{bedrijf_naam}</p>
</td>
</tr>

</table>
<!-- /Container -->

</td></tr>
</table>
</body>
</html>
