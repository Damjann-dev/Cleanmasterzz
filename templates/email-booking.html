<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{onderwerp}</title>
</head>
<body style="margin:0;padding:0;background-color:#f4f6f8;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;">
<table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#f4f6f8;">
<tr><td align="center" style="padding:30px 15px;">

<!-- Container -->
<table role="presentation" width="600" cellpadding="0" cellspacing="0" style="background-color:#ffffff;border-radius:12px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,0.08);">

<!-- Header -->
<tr>
<td style="background:{primary_color};padding:28px 40px;text-align:center;">
    {logo_html}
    <h1 style="margin:0;color:#ffffff;font-size:20px;font-weight:600;letter-spacing:-0.3px;">{header_titel}</h1>
</td>
</tr>

<!-- Body -->
<tr>
<td style="padding:32px 40px;">
    <p style="margin:0 0 20px;color:#2d3436;font-size:15px;line-height:1.6;">{intro_tekst}</p>

    <!-- Booking Info Card -->
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background:#f8f9fa;border-radius:8px;margin-bottom:24px;">
    <tr><td style="padding:20px 24px;">
        <table role="presentation" width="100%" cellpadding="0" cellspacing="0">
            <tr>
                <td style="padding:4px 0;color:#6c757d;font-size:13px;width:130px;">Naam</td>
                <td style="padding:4px 0;color:#2d3436;font-size:14px;font-weight:500;">{naam}</td>
            </tr>
            <tr>
                <td style="padding:4px 0;color:#6c757d;font-size:13px;">E-mail</td>
                <td style="padding:4px 0;color:#2d3436;font-size:14px;">{email}</td>
            </tr>
            <tr>
                <td style="padding:4px 0;color:#6c757d;font-size:13px;">Telefoon</td>
                <td style="padding:4px 0;color:#2d3436;font-size:14px;">{telefoon}</td>
            </tr>
            <tr>
                <td style="padding:4px 0;color:#6c757d;font-size:13px;">Adres</td>
                <td style="padding:4px 0;color:#2d3436;font-size:14px;">{adres}</td>
            </tr>
            {locatie_rij}
            <tr>
                <td style="padding:4px 0;color:#6c757d;font-size:13px;">Voorkeursdatum</td>
                <td style="padding:4px 0;color:#2d3436;font-size:14px;">{datum}</td>
            </tr>
        </table>
    </td></tr>
    </table>

    <!-- Services Table -->
    <h3 style="margin:0 0 12px;color:#2d3436;font-size:16px;font-weight:600;">Diensten</h3>
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="margin-bottom:20px;">
        <tr style="background:#f1f3f5;">
            <td style="padding:10px 14px;color:#495057;font-size:12px;font-weight:600;text-transform:uppercase;border-radius:6px 0 0 0;">Dienst</td>
            <td style="padding:10px 14px;color:#495057;font-size:12px;font-weight:600;text-transform:uppercase;text-align:center;">Aantal</td>
            <td style="padding:10px 14px;color:#495057;font-size:12px;font-weight:600;text-transform:uppercase;text-align:right;border-radius:0 6px 0 0;">Bedrag</td>
        </tr>
        {diensten_rijen}
    </table>

    {voorrijkosten_rij}

    <!-- Total -->
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="border-top:2px solid {primary_color};margin-top:8px;">
    <tr>
        <td style="padding:14px 14px 0;color:#2d3436;font-size:16px;font-weight:700;">Totaal</td>
        <td style="padding:14px 14px 0;color:{primary_color};font-size:18px;font-weight:700;text-align:right;">{totaal}</td>
    </tr>
    <tr>
        <td colspan="2" style="padding:4px 14px 0;color:#6c757d;font-size:12px;text-align:right;">{btw_tekst}</td>
    </tr>
    </table>

    {bericht_blok}

    {portal_knop}
</td>
</tr>

<!-- Footer -->
<tr>
<td style="background:#f8f9fa;padding:20px 40px;border-top:1px solid #e9ecef;text-align:center;">
    <p style="margin:0;color:#6c757d;font-size:12px;line-height:1.5;">{footer_tekst}</p>
    <p style="margin:8px 0 0;color:#adb5bd;font-size:11px;">{bedrijf_naam}</p>
</td>
</tr>

</table>
<!-- /Container -->

</td></tr>
</table>
</body>
</html>
