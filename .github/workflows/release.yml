name: Release Plugin

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]*'   # bijv. 1.3.0
      - 'v[0-9]+.[0-9]+.[0-9]*'  # bijv. v1.3.0
  workflow_dispatch:
    inputs:
      version:
        description: 'Versienummer (bijv. v1.3.0)'
        required: true
        default: 'v1.3.0'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version from tag or input
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Create plugin ZIP
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          SLUG="cleanmasterzz-calculator"
          mkdir -p build/${SLUG}

          # Kopieer alleen WordPress plugin bestanden
          rsync -av \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='node_modules' \
            --exclude='license-server' \
            --exclude='licenses-api.php' \
            --exclude='vps-setup.sh' \
            --exclude='website' \
            --exclude='servicezz-website' \
            --exclude='SETUP.md' \
            --exclude='README.md' \
            --exclude='.gitignore' \
            --exclude='build' \
            --exclude='*.zip' \
            . build/${SLUG}/

          # Create ZIP
          cd build
          zip -r ../${SLUG}-${VERSION}.zip ${SLUG}/
          echo "ZIP created successfully."

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          name: "v${{ steps.version.outputs.VERSION }}"
          body: |
            ## CleanMasterzz Calculator v${{ steps.version.outputs.VERSION }}

            ### Installeren
            1. Download `cleanmasterzz-calculator-${{ steps.version.outputs.VERSION }}.zip`
            2. WordPress → Plugins → Nieuwe plugin → ZIP uploaden

            **Of** via de automatische updater in uw WordPress dashboard.
          files: cleanmasterzz-calculator-${{ steps.version.outputs.VERSION }}.zip
          draft: false
          prerelease: false