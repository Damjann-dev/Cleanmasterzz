# Nginx configuratie voor Cleanmasterzz License Server
# Aanpassen: vervang licenses.jouwdomein.nl door uw eigen domein
# Pad: /etc/nginx/sites-available/licenses.cleanmasterzz.nl

server {
    listen 80;
    server_name licenses.cleanmasterzz.nl;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name licenses.cleanmasterzz.nl;

    root /var/www/licenses;
    index index.php;

    # SSL (Let's Encrypt — gegenereerd via certbot)
    ssl_certificate     /etc/letsencrypt/live/licenses.cleanmasterzz.nl/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/licenses.cleanmasterzz.nl/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # Beveiligingsheaders
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options DENY;
    add_header X-XSS-Protection "1; mode=block";
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Geen toegang tot config bestanden
    location ~ /config\.php { deny all; return 404; }
    location ~ /install\.php { deny all; return 404; }
    location ~ /\.          { deny all; return 404; }

    # API routes
    location /api/ {
        try_files $uri $uri/ /api/index.php?$query_string;
    }

    # Admin routes
    location /admin/ {
        try_files $uri $uri/ /admin/index.php?$query_string;
    }

    # PHP verwerking
    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.2-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }

    # Logging
    access_log /var/log/nginx/licenses.access.log;
    error_log  /var/log/nginx/licenses.error.log;
}
